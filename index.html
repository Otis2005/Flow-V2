<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A2240" />

    <!-- ── Favicons + PWA manifest ────────────────────────────────
         Google Search does NOT read SVG favicons in results listings.
         Order matters: .ico first (legacy + Google fallback), then PNGs
         at multiple sizes, then SVG as a modern progressive enhancement.
         apple-touch-icon must be PNG (Apple ignores SVG). -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Primary SEO ───────────────────────────────────────────── -->
    <title>TenderFlow. East African tender intelligence.</title>
    <meta
      name="description"
      content="One feed for live Government, NGO and SME tenders across Kenya, Uganda and Tanzania. Search, filter, save and download tender documents. Free for bidders."
    />
    <meta name="keywords" content="tenders Kenya, tenders Uganda, tenders Tanzania, government tenders east africa, NGO tenders, procurement opportunities, eGP Kenya, TANePS, tender intelligence" />
    <meta name="author" content="TenderFlow" />
    <link rel="canonical" href="https://tenderflow.co.ke/" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp link previews) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TenderFlow" />
    <meta property="og:title" content="TenderFlow. East African tender intelligence." />
    <meta
      property="og:description"
      content="One feed for live Government, NGO and SME tenders across Kenya, Uganda and Tanzania. Free for bidders."
    />
    <meta property="og:url" content="https://tenderflow.co.ke/" />
    <meta property="og:locale" content="en_KE" />
    <meta property="og:image" content="https://tenderflow.co.ke/og-cover.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TenderFlow. Pan-East African tender intelligence." />

    <!-- ── Twitter Card ───────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TenderFlow. East African tender intelligence." />
    <meta
      name="twitter:description"
      content="One feed for Government, NGO and SME tenders across Kenya, Uganda and Tanzania."
    />
    <meta name="twitter:image" content="https://tenderflow.co.ke/og-cover.png" />

    <!-- ── Robots ──────────────────────────────────────────────────
         Allow indexing of public pages. Per-route robots tags can be
         set later for /admin etc if Google still crawls them despite
         the robots.txt block. -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- ── Structured data: Organization (JSON-LD) ─────────────────
         Helps Google show a knowledge panel and surface contact info
         in rich results. `sameAs` is the entity-consolidation signal:
         once a social profile exists, list its URL here so Google
         knows it belongs to the same TenderFlow brand. Strong signal
         for outranking other "TenderFlow" sites in different regions.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TenderFlow",
      "alternateName": ["TenderFlow Kenya", "TenderFlow East Africa"],
      "url": "https://tenderflow.co.ke",
      "logo": "https://tenderflow.co.ke/brand/mark-512.png",
      "description": "East African tender intelligence. Government, NGO and SME tender opportunities across Kenya, Uganda and Tanzania, consolidated in one searchable feed.",
      "foundingDate": "2026",
      "foundingLocation": {
        "@type": "Place",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Nairobi",
          "addressCountry": "KE"
        }
      },
      "areaServed": [
        { "@type": "Country", "name": "Kenya" },
        { "@type": "Country", "name": "Uganda" },
        { "@type": "Country", "name": "Tanzania" }
      ],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Eden Square Complex, Chiromo Road, Westlands, Block 1, 7th Floor",
        "addressLocality": "Nairobi",
        "addressRegion": "Nairobi County",
        "postalCode": "00100",
        "addressCountry": "KE"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+254-724-131-492",
        "contactType": "customer support",
        "email": "help@tenderflow.co.ke",
        "areaServed": ["KE", "UG", "TZ"],
        "availableLanguage": ["English"]
      },
      "sameAs": [
        "https://www.linkedin.com/company/tenderflow-east-africa",
        "https://x.com/tenderflow_ea",
        "https://www.facebook.com/TenderFlowEastAfrica",
        "https://share.google/xGvmjVksIbihBug2t"
      ]
    }
    </script>

    <!-- ── Structured data: WebSite with SearchAction ──────────────
         Tells Google your site has search; sometimes earns a search
         box right inside the search results. `inLanguage` reinforces
         the Kenya geo-targeting so a Kenyan searcher's results pick
         this site over a same-name site in another region. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TenderFlow",
      "alternateName": "TenderFlow Kenya",
      "url": "https://tenderflow.co.ke",
      "inLanguage": "en-KE",
      "publisher": {
        "@type": "Organization",
        "name": "TenderFlow",
        "url": "https://tenderflow.co.ke"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://tenderflow.co.ke/tenders?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Google Search Console ownership verification. Token issued
         2026-05-16. Used to prove site ownership to a second Google
         account (cross-permissioning workaround). -->
    <meta name="google-site-verification" content="xRJXzhy-yV-JFU3xUVMdEs1Cnw4mPcnfVEcRbBNJzvs" />

    <!-- ── Preload + Fonts ───────────────────────────────────────── -->
    <link
      rel="preload"
      as="image"
      fetchpriority="high"
      href="https://tenderflow.co.ke/og-cover.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body data-badges="default" data-typepair="spectral-publicsans" style="background-color: rgb(229, 233, 217)">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
