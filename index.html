<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Pan-African tender intelligence. Government, NGO and SME opportunities, consolidated." />
    <title>TenderFlow. Pan-African tenders, consolidated.</title>

    <!--
      Preload the hero image from Supabase Storage. Same CDN as the rest
      of the site (no extra cross-origin handshake) and ~70% smaller than
      the original Unsplash JPEG because it is pre-compressed WebP.
      The browser fetches this in parallel with the JS bundle the moment
      it parses the HTML, so the hero is ready when React mounts.
      KEEP THIS URL in sync with HERO_IMAGE in src/components/HeroBackdrop.jsx.
    -->
    <link
      rel="preload"
      as="image"
      fetchpriority="high"
      href="https://rtessqlvvsjecogctwok.supabase.co/storage/v1/object/public/tender-pdfs/hero/construction.webp"
    />

    <!-- Trimmed fonts: only the three families actually used (Spectral / Public Sans / JetBrains Mono). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body data-badges="default" data-typepair="spectral-publicsans" style="background-color: rgb(229, 233, 217)">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
