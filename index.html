<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Pan-African tender intelligence. Government, NGO and SME opportunities, consolidated." />
    <title>TenderFlow. Pan-African tenders, consolidated.</title>

    <!--
      Preconnect to Unsplash so the TLS handshake is done by the time we
      need the hero image. Speeds up first paint.
    -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />

    <!--
      Preload the hero image. The browser starts fetching it immediately
      from the HTML parser, in parallel with the JS bundle, so it's ready
      by the time React renders <HeroBackdrop />.
      Keep this URL in sync with HERO_IMAGE in src/components/HeroBackdrop.jsx.
    -->
    <link
      rel="preload"
      as="image"
      fetchpriority="high"
      href="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=1600&q=80&auto=format&fit=crop"
    />

    <!-- Trimmed fonts: only the three families actually used (Spectral / Public Sans / JetBrains Mono). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body data-badges="default" data-typepair="spectral-publicsans" style="background-color: rgb(229, 233, 217)">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
