<?xml version="1.0" encoding="UTF-8"?>
<!--
  TenderFlow mark only (no wordmark).
  Use when the brand is already established in the surrounding context:
  favicons, app icons at 64+px, social profile avatars, sticker assets.
  Never as a standalone first-touch logo.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TenderFlow mark">
  <title>TenderFlow mark</title>
  <rect x="8"  y="34" width="10" height="22" fill="#C7841A" />
  <rect x="22" y="22" width="10" height="34" fill="#00A98F" />
  <rect x="36" y="8"  width="10" height="48" fill="#0A2240" />
</svg>
