<?xml version="1.0" encoding="UTF-8"?>
<!--
  TenderFlow primary logo lockup (light background variant).
  Three bars mark + italic-em wordmark.
  Colours: amber, teal, navy. Font: Spectral 500 / 500 italic.
  Use on cream / paper / white surfaces.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" role="img" aria-label="TenderFlow logo">
  <title>TenderFlow</title>
  <desc>TenderFlow brand mark: three vertical bars in amber, teal, navy, with the italic wordmark.</desc>

  <!-- Mark: three bars, short to tall -->
  <g>
    <rect x="8"  y="40" width="8" height="24" fill="#C7841A" />
    <rect x="22" y="28" width="8" height="36" fill="#00A98F" />
    <rect x="36" y="14" width="8" height="50" fill="#0A2240" />
  </g>

  <!-- Wordmark: 'Tender' regular + 'Flow' italic, both Spectral 500 -->
  <text x="60" y="58" font-family="Spectral, Georgia, 'Times New Roman', serif"
        font-size="44" font-weight="500" fill="#0A2240"
        letter-spacing="-0.5">Tender<tspan font-style="italic">Flow</tspan></text>
</svg>
