<?xml version="1.0" encoding="UTF-8"?>
<!--
  Apple touch icon (180x180 viewport; rendered scaled to fit iOS
  home-screen tiles). Same composition as favicon but slightly
  more generous padding because iOS adds its own corner mask.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="36" fill="#0A2240" />
  <rect x="36"  y="100" width="22" height="48" fill="#C7841A" />
  <rect x="68"  y="76"  width="22" height="72" fill="#00A98F" />
  <rect x="100" y="44"  width="22" height="104" fill="#FFFDF7" />
</svg>
